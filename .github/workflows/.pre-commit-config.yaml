name: Pre-Commit checks

on:
  push:
    branches:
      - main
  pull_request: # Trigger on all by default


jobs:
  pre-commit-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run:  |
          pip install --upgrade pip
          pip install -e .[dev]

      - name:
        run: | 
          pre-commit run --all-files
