<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Access</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 32px 40px 40px 40px; }
        h2 { color: #2d3a4b; margin-bottom: 24px; }
        form { display: flex; flex-direction: column; gap: 16px; }
        label { font-weight: 500; color: #444; }
        select, input[type="text"] { padding: 8px 10px; border: 1px solid #bfcad6; border-radius: 4px; font-size: 1em; }
        input[type="checkbox"] { margin-right: 8px; }
        button { padding: 10px 0; border: none; border-radius: 4px; background: #1976d2; color: #fff; font-size: 1em; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #125ea2; }
        .back-link { display: inline-block; margin-top: 16px; color: #1976d2; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Request Dataset Access</h2>
        <form method="post">
            <label for="dataset_id">Dataset:</label>
            <select name="dataset_id" id="dataset_id">
                {% for dataset in datasets %}
                    <option value="{{ dataset.id }}">{{ dataset.name }} ({{ dataset.sensitivity }})</option>
                {% endfor %}
            </select>
            <!-- Access type is inherited from dataset, no manual selection -->
            <label for="purpose">Purpose:</label>
            <input type="text" name="purpose" id="purpose" required>
            <label><input type="checkbox" name="training_confirmed"> I confirm I have completed the required training</label>
            <button type="submit">Submit Request</button>
        </form>
        <a class="back-link" href="{{ url_for('index') }}">&larr; Back to Home</a>
    </div>
</body>
</html>
