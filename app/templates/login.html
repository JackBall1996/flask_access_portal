<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 32px 40px 40px 40px; }
        h2 { color: #2d3a4b; margin-bottom: 24px; }
        form { display: flex; flex-direction: column; gap: 16px; }
        label { font-weight: 500; color: #444; }
        input[type="text"], input[type="password"] { padding: 8px 10px; border: 1px solid #bfcad6; border-radius: 4px; font-size: 1em; }
        button { padding: 10px 0; border: none; border-radius: 4px; background: #1976d2; color: #fff; font-size: 1em; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #125ea2; }
        .back-link { display: inline-block; margin-top: 16px; color: #1976d2; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Login</h2>
        <form method="post">
            <label for="username">Username:</label>
            <input type="text" name="username" id="username" required>
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required>
            <button type="submit">Login</button>
        </form>
        <a class="back-link" href="{{ url_for('index') }}">&larr; Back to Home</a>
    </div>
</body>
</html>
