<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Portal</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
        .container { max-width: 700px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 32px 40px 40px 40px; }
        h1 { color: #2d3a4b; margin-bottom: 24px; }
        .nav {
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .nav a {
            color: #1976d2;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 5px;
            background: #e9eef3;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .nav a:hover {
            text-decoration: underline;
            background: #d1e3fa;
        }
        .user-info { margin-bottom: 16px; color: #444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to the Access Portal</h1>
        {% if current_user.is_authenticated %}
            <div class="user-info">Hello, {{ current_user.username }}! <a href="{{ url_for('logout') }}">Logout</a></div>
            <div class="nav">
                <a href="{{ url_for('request_access') }}">Request Dataset Access</a>
                <a href="{{ url_for('my_requests') }}">My Requests</a>
                {% if current_user.is_approver %}
                    <a href="{{ url_for('manage_datasets') }}">Admin: Datasets</a>
                    <a href="{{ url_for('manage_rules') }}">Admin: Rules</a>
                    <a href="{{ url_for('approver_dashboard') }}">Approver Dashboard</a>
                {% endif %}
            </div>
        {% else %}
            <div class="nav"><a href="{{ url_for('login') }}">Login</a></div>
        {% endif %}
    </div>
</body>
</html>
