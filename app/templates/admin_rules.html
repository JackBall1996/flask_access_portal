<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin: Rules</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 32px 40px 40px 40px; }
        h2 { color: #2d3a4b; margin-bottom: 24px; }
        form { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        label { font-weight: 500; color: #444; }
        select { padding: 8px 10px; border: 1px solid #bfcad6; border-radius: 4px; font-size: 1em; }
        input[type="checkbox"] { margin-right: 8px; }
        button { padding: 10px 0; border: none; border-radius: 4px; background: #1976d2; color: #fff; font-size: 1em; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #125ea2; }
        h3 { margin-top: 32px; color: #2d3a4b; }
        ul { padding-left: 20px; }
        li { margin-bottom: 8px; color: #444; }
        .back-link { display: inline-block; margin-top: 16px; color: #1976d2; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Manage Approval Rules</h2>
        <form method="post">
            <label for="dataset_id">Dataset:</label>
            <select name="dataset_id" id="dataset_id">
                {% for dataset in datasets %}
                    <option value="{{ dataset.id }}">{{ dataset.name }}</option>
                {% endfor %}
            </select>
            <label><input type="checkbox" name="auto_approve"> Auto-approve requests for this dataset</label>
            <button type="submit">Add Rule</button>
        </form>
        <h3>Existing Rules</h3>
        <ul>
            {% for rule in rules %}
                <li>Dataset ID: {{ rule.dataset_id }} | Auto-approve: {{ rule.auto_approve }}</li>
            {% endfor %}
        </ul>
        <a class="back-link" href="{{ url_for('index') }}">&larr; Back to Home</a>
    </div>
</body>
</html>
